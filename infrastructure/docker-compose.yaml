name: tinia
services:
  frontend:
    build:
      dockerfile: frontend/Dockerfile
      context: ..
    depends_on:
      - backend
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      TINIA_SECURITY_ALLOWED_ORIGINS: "http://localhost"
    depends_on:
      - redis
      - rabbitmq
  extractor:
    build:
      context: ..
      dockerfile: extractor/Dockerfile
    depends_on:
      - backend
      - rabbitmq
  extractor2:
    build:
      context: ..
      dockerfile: extractor/Dockerfile
    depends_on:
      - backend
      - rabbitmq

  ingress:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

  redis:
    image: redis:7.0
  rabbitmq:
    image: rabbitmq:3
