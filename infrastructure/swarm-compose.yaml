services:
  frontend:
    image: git.jaypi4c.de/jaypi4c/tinia/frontend
    ports:
      - "8080:8080"
    environment:
      TINIA_BACKEND_URL: http://localhost:8081
    deploy:
      replicas: 2
      endpoint_mode: vip
  backend:
    image: git.jaypi4c.de/jaypi4c/tinia/backend
    ports:
      - "8081:8081"
    environment:
      TINIA_SECURITY_ALLOWEDORIGINS: http://localhost:8080
    deploy:
      replicas: 2
      endpoint_mode: vip
  extractor:
    image: git.jaypi4c.de/jaypi4c/tinia/extractor
    deploy:
      replicas: 5
      endpoint_mode: vip
  openehr:
    image: git.jaypi4c.de/jaypi4c/tinia/openehr
    deploy:
      replicas: 2
      endpoint_mode: vip

  rabbitmq:
    image: rabbitmq

  ehrbase:
    image: ehrbase/ehrbase:2.31.0
    environment:
      DB_URL: jdbc:postgresql://ehrdb:5432/ehrbase
      DB_USER_ADMIN: ehrbase
      DB_PASS_ADMIN: ehrbase
      DB_USER: ehrbase_restricted
      DB_PASS: ehrbase_restricted
      SERVER_NODENAME: local.ehrbase.org
      SPRING_PROFILES_ACTICE: local
    depends_on:
      - ehrdb
  ehrdb:
    image: ehrbase/ehrbase-v2-postgres:16.2
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      EHRBASE_USER_ADMIN: ehrbase
      EHRBASE_PASS_ADMIN: ehrbase
      EHRBASE_USER: ehrbase_restricted
      EHRBASE_PASS: ehrbase_restricted
