openapi: 3.0.3
info:
  title: Tinia public API
  version: 0.0.1
  description: API to interact with Tinia services.

servers:
  - url: http://localhost:8080/api/v1

paths:
  /bmp/upload:
    post:
      summary: Upload a file containing BMP
      description:
        tbd
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The PDF or image file to upload.
                processOcr:
                  type: boolean
                  description: Whether to process the uploaded file via OCR.
                  default: false
              required:
                - file
      responses:
        '202':
          description: File accepted for processing
        '400':
          description: Invalid input
