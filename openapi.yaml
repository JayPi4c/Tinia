openapi: 3.1.1
info:
  title: Tinia
  description: API for the Tinia Service
  version: 1.0.0-SNAPSHOT

servers:
  - url: 'http://localhost:8080/api/v1'

paths:
  /bmp/extract:
    post:
      summary: Extracts BMPs (Bundeseinheitlicher Medikationsplan) from PDF files
      description: Extracts BMPs (Bundeseinheitlicher Medikationsplan) from PDF files
      operationId: extractBmp
      requestBody:
        content:
          multipart/form-data:
            schema:
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        '200':
          description: extraction successful
        '400':
          description: Bad request
        '500':
          description: Internal server error