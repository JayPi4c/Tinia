name: Verify

on:
  push:
  workflow_call:

jobs:
  verify:
    name: verify
    runs-on: debian-trixie
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK
        uses: https://github.com/actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Verify with Maven
        run: ./mvnw --batch-mode --update-snapshots verify
